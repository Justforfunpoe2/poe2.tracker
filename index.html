<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        * { box-sizing: border-box; }
        body, html { height: 100%; margin: 0; display: flex; justify-content: center; align-items: center; background: #121212; color: #eee; font-family: sans-serif; overflow: hidden; }
        #app { width: 1200px; max-width: 98vw; max-height: 98vh; background: #1e1e1e; padding: 20px; border-radius: 12px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.8); display: flex; gap: 20px; overflow-y: auto; }
        #sidebar { width: 360px; min-width: 300px; background: #161616; border-radius: 8px; padding: 12px; border: 1px solid #2a2a2a; display: flex; flex-direction: column; gap: 4px; max-height: 700px; overflow-y: auto; }
        #sidebar h4 { margin: 0 0 8px 0; color: #f5c842; text-align: center; font-size: 1em; border-bottom: 1px solid #333; padding-bottom: 6px; }
        .beast-group { background: #1a1a1a; border: 1px solid #2a2a3a; border-radius: 4px; margin-bottom: 5px; padding: 5px 8px; }
        .beast-header { display: flex; align-items: center; gap: 6px; cursor: pointer; padding: 3px 4px; font-size: 0.85em; flex-wrap: nowrap; }
        .beast-header:hover { background: #2a2a2a; border-radius: 3px; }
        .beast-name { font-weight: bold; color: #aac; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100px; flex-shrink: 1; font-size: 0.9em; }
        .beast-cost { color: #6af; font-size: 0.75em; background: #1a2a3a; padding: 1px 8px; border-radius: 10px; white-space: nowrap; flex-shrink: 0; }
        .beast-location { color: #888; font-size: 0.65em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 80px; flex-shrink: 1; }
        .aura-list { margin-left: 14px; padding: 3px 0; display: flex; flex-wrap: wrap; gap: 3px; }
        .aura-item { display: inline-block; padding: 1px 6px; font-size: 0.65em; background: #252525; border-radius: 8px; border: 1px solid #333; color: #bbb; white-space: nowrap; }
        .aura-item.collected { border-color: #4a8a4a; color: #8a8; }
        .selected-beast { background: #1a2a3a; border-color: #4a6a8a; }
        #main { flex:1; min-width: 300px; }
        .grid-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        input { width: 100%; box-sizing: border-box; background: #2a2a2a; color: white; border: 1px solid #444; padding: 8px 10px; margin-bottom: 8px; border-radius: 4px; text-align: center; font-size: 0.9em; }
        #progress-bar { height: 10px; background: #333; margin: 10px 0; border-radius: 4px; overflow: hidden; }
        #progress-fill { height: 100%; background: #00ff00; width: 0%; transition: width 0.3s; }
        #log { height: 110px; overflow-y: auto; background: #000; padding: 8px; font-size: 0.8em; border: 1px solid #444; margin: 8px 0; border-radius: 4px; }
        #log div { border-bottom: 1px solid #222; padding: 3px 0; }
        button { cursor: pointer; padding: 8px 12px; margin: 3px 0; border: none; border-radius: 4px; background: #333; color: white; font-weight: bold; font-size: 0.85em; }
        button:hover { background: #444; }
        .flex-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
        .badge { background: #2a2a2a; padding: 4px 10px; border-radius: 16px; font-size: 0.8em; }
        .reset-btn { background: #400; }
        .reset-btn:hover { background: #600; }
        .export-btn { background: #1a3a5a; }
        .export-btn:hover { background: #2a5a7a; }
        .pause-btn { background: #5a4a2a; }
        .pause-btn:hover { background: #7a5a3a; }
        .log-aura-btn { background: #2a4a3a; border: 1px solid #3a6a4a; color: #afa; }
        .log-aura-btn:hover { background: #3a6a4a; }
        .seen-btn { background: #8a7a2a; border: 1px solid #aa8a3a; color: #ffd; }
        .seen-btn:hover { background: #aa8a3a; }
        .target-display { background: #1a2a3a; padding: 6px 14px; border-radius: 16px; border: 1px solid #4a6a8a; font-weight: bold; color: #f5c842; font-size: 0.9em; }
        .clear-btn { background: #3a2a2a; border: 1px solid #5a3a3a; color: #faa; font-size: 0.7em; padding: 2px 8px; }
        .clear-btn:hover { background: #5a3a3a; }
        .aura-collection { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
        .aura-collection-item { display: flex; align-items: center; gap: 4px; background: #1a1a1a; padding: 4px 12px; border-radius: 14px; font-size: 0.8em; border: 1px solid #333; }
        .aura-collection-item.collected { border-color: #4a8a4a; background: #1a2a1a; }
        .aura-collection-item.missing { border-color: #5a3a3a; background: #2a1a1a; opacity: 0.6; }
        .aura-collection-item .count { color: #8a8; font-weight: bold; margin-left: 4px; }
        #collection-progress { background: #0a0a0a; border: 1px solid #2a3a3a; border-radius: 6px; padding: 8px 10px; margin-bottom: 8px; }
        #collection-progress .title { font-size: 0.9em; }
        .button-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 5px; margin-top: 8px; }
        .success-history { background: #0a0a0a; border: 1px solid #2a3a2a; border-radius: 6px; padding: 8px 10px; margin-bottom: 8px; max-height: 140px; overflow-y: auto; }
        .success-history .title { font-size: 0.85em; color: #8a8; font-weight: bold; margin-bottom: 6px; display: flex; justify-content: space-between; }
        .success-entry { display: flex; align-items: center; gap: 8px; padding: 3px 6px; font-size: 0.8em; border-bottom: 1px solid #1a1a1a; flex-wrap: wrap; }
        .success-entry .s-beast { color: #f5c842; font-weight: bold; font-size: 0.9em; }
        .success-entry .s-aura { background: #1a2a1a; padding: 1px 8px; border-radius: 8px; font-size: 0.7em; border: 1px solid #2a4a2a; color: #8a8; }
        .success-entry .s-time { color: #666; font-size: 0.7em; margin-left: auto; }
        .import-area { display: flex; gap: 6px; align-items: center; margin-top: 4px; }
        .import-area input[type="file"] { display: none; }
        .import-btn { background: #2a3a2a; border: 1px solid #4a5a4a; font-size: 0.85em; }
        .import-btn:hover { background: #3a5a3a; }
        .clear-history-btn { background: #3a2a2a; border: 1px solid #5a3a3a; color: #faa; font-size: 0.7em; padding: 2px 10px; }
        .clear-history-btn:hover { background: #5a3a3a; }
        .stats-text { font-size: 0.9em; }
        .stats-number { font-size: 1.1em; font-weight: bold; }
        .cycle-time { font-size: 1em; }
        .total-time { font-size: 1em; }
        @media (max-width: 800px) { #app { flex-direction: column; align-items: center; } #sidebar { width: 100%; max-height: 250px; } .button-row { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>

<div id="app">
    <!-- SIDEBAR -->
    <div id="sidebar">
        <h4>🐾 Beasts & Auras</h4>
        <div id="beastList"></div>
        <div style="margin-top:6px; font-size:0.7em; color:#666; text-align:center;">click beast to target</div>
    </div>

    <!-- MAIN PANEL -->
    <div id="main">
        <!-- SUCCESS HISTORY -->
        <div class="success-history" id="successHistory">
            <div class="title">
                <span>🏆 Success History</span>
                <span><span id="successCount">0</span> total</span>
            </div>
            <div id="successList"></div>
        </div>

        <div class="flex-row" style="justify-content:space-between;">
            <input type="text" id="timerName" value="Beast_Farm" onchange="saveData()" style="width:35%; font-size:0.9em;">
            <span class="badge" id="sessionId">⚡ #001</span>
            <div class="import-area">
                <button class="import-btn" onclick="document.getElementById('csvFile').click()">📥 Load CSV</button>
                <input type="file" id="csvFile" accept=".csv" onchange="importCSV(event)">
            </div>
        </div>

        <!-- COLLECTION PROGRESS -->
        <div id="collection-progress">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span class="title">🏆 Collection</span>
                <span style="font-size:0.8em; color:#aaa;">Progress: <span id="collectionProgress">0/0</span></span>
            </div>
            <div id="auraCollection" class="aura-collection"></div>
        </div>
        
        <div style="text-align: center; font-size: 1.05em;">
            Total: <span id="totalTime">00:00:00</span> | Cycle: <span id="cycleTime" style="color: #ff0;">00:00:00</span>
        </div>
        
        <div id="progress-bar"><div id="progress-fill"></div></div>
        
        <div class="grid-layout">
            <div class="stats-text">❌ Fail: <span class="stats-number" id="rCount">0</span></div>
            <div class="stats-text">✅ Success: <span class="stats-number" id="gCount">0</span></div>
            <div class="stats-text">👀 Seen: <span class="stats-number" id="seenCount">0</span></div>
            <div class="stats-text">📊 Rate: <span class="stats-number" id="pct">0.0%</span></div>
        </div>

        <!-- Current target -->
        <div style="margin: 8px 0; background: #161616; padding: 10px; border-radius: 6px; border: 1px solid #2a3a3a;">
            <div style="display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 6px;">
                <span style="font-size:0.9em;">🎯 Target:</span>
                <span id="targetDisplay" class="target-display">None</span>
                <button class="clear-btn" onclick="clearTarget()">✕</button>
                <span style="font-size:0.8em; color:#aaa; margin-left:auto;">Spirit: <span id="targetCostDisplay">-</span></span>
            </div>
            <div id="targetAuras" style="display: flex; gap: 5px; flex-wrap: wrap; padding: 6px; min-height: 32px; background: #0a0a0a; border-radius: 4px; border: 1px solid #2a2a2a;">
                <span style="color:#666; font-size:0.8em;">Select a beast</span>
            </div>
            <div class="button-row">
                <button class="log-aura-btn" onclick="logSuccess()">✅ Success (G)</button>
                <button class="seen-btn" onclick="logSeen()">👀 Seen (S)</button>
                <button onclick="add(true)" style="background: #a00;">❌ Fail (R)</button>
                <button onclick="togglePause()" id="pauseBtn" class="pause-btn">⏸️</button>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px;">
            <button onclick="exportCSV()" class="export-btn">📤 Export CSV</button>
            <button onclick="resetStats()" class="reset-btn">🔄 Reset</button>
            <button onclick="clearHistory()" class="clear-history-btn">🗑️ Clear History</button>
        </div>

        <div id="log"><strong>Log:</strong></div>
        <div style="font-size:0.7em; color:#666; text-align:center; margin-top:4px;">R=Fail | G=Success | S=Seen | Space=Pause</div>
    </div>
</div>

<script>
    const ALL_AURAS = ["Haste Aura", "Periodic Invulnerability Aura", "Extra Physical Damage Aura", "Energy Shield Aura", "Elemental Resistance Aura", "Temporal Bubble", "Hinder Aura", "Shock on Hit", "Poison on Hit", "Life Leech", "Always Stun", "Bleed on Hit", "Projectile Weakness on Hit", "Chill on Hit", "Shock on all Damage", "Ignite on Hit"];

    const BEAST_DB = [
        { name: "Plague Swarm", cost: 21, location: "Mawdun Quarry", auras: ["Haste Aura", "Periodic Invulnerability Aura", "Extra Physical Damage Aura", "Energy Shield Aura", "Elemental Resistance Aura", "Temporal Bubble", "Hinder Aura", "Shock on Hit", "Poison on Hit"] },
        { name: "Swarming Wisp", cost: 21, location: "Ashen Forest", auras: ["Periodic Invulnerability Aura", "Extra Physical Damage Aura", "Energy Shield Aura", "Elemental Resistance Aura", "Temporal Bubble", "Hinder Aura", "Shock on Hit"] },
        { name: "Bloodthief Wisp", cost: 21, location: "Qimah", auras: ["Extra Physical Damage Aura", "Energy Shield Aura", "Elemental Resistance Aura", "Temporal Bubble", "Hinder Aura", "Life Leech", "Shock on Hit"] },
        { name: "Crag Leaper", cost: 23.1, location: "Vastiri Outskirts", auras: ["Haste Aura", "Periodic Invulnerability Aura", "Extra Physical Damage Aura", "Energy Shield Aura", "Elemental Resistance Aura", "Temporal Bubble", "Always Stun", "Shock on Hit"] },
        { name: "Flesh Larva", cost: 23.1, location: "Mapping Essence", auras: ["Extra Physical Damage Aura", "Energy Shield Aura", "Elemental Resistance Aura", "Periodic Invulnerability Aura", "Bleed on Hit", "Poison on Hit"] },
        { name: "Porcupine Quill", cost: 24.9, location: "Whakapanu", auras: ["Haste Aura", "Periodic Invulnerability Aura", "Extra Physical Damage Aura", "Energy Shield Aura", "Elemental Resistance Aura", "Temporal Bubble", "Hinder Aura", "Projectile Weakness on Hit", "Chill on Hit"] },
        { name: "Coconut Crab", cost: 24.9, location: "Whakapanu", auras: ["Haste Aura", "Periodic Invulnerability Aura", "Extra Physical Damage Aura", "Energy Shield Aura", "Elemental Resistance Aura", "Temporal Bubble", "Hinder Aura", "Chill on Hit"] },
        { name: "Bramble Ape", cost: 24.9, location: "Kriar Village", auras: ["Extra Physical Damage Aura", "Energy Shield Aura", "Elemental Resistance Aura"] },
        { name: "Rasp Scavenger", cost: 26.7, location: "Khari Crossing", auras: ["Elemental Resistance Aura", "Extra Physical Damage Aura", "Energy Shield Aura", "Shock on all Damage", "Hinder Aura"] },
        { name: "Winged Fiend", cost: 26.7, location: "Qimah", auras: ["Energy Shield Aura", "Haste Aura", "Extra Physical Damage Aura", "Ignite on Hit", "Periodic Invulnerability Aura"] },
        { name: "Sabre Spider", cost: 28.2, location: "", auras: ["Extra Physical Damage Aura", "Elemental Resistance Aura", "Periodic Invulnerability Aura", "Poison on Hit", "Always Stun"] },
        { name: "Hyena Demon", cost: 30, location: "Vastiri Outskirts", auras: ["Extra Physical Damage Aura", "Haste Aura", "Energy Shield Aura", "Life Leech", "Bleed on Hit", "Periodic Invulnerability Aura"] },
        { name: "Fungal Wolf", cost: 30, location: "Ashen Forest", auras: ["Energy Shield Aura", "Elemental Resistance Aura", "Extra Physical Damage Aura", "Poison on Hit"] },
        { name: "Mantis Rat", cost: 30, location: "", auras: ["Extra Physical Damage Aura", "Shock on Hit", "Hinder Aura"] },
        { name: "Chaw Mongrel", cost: 30, location: "", auras: ["Extra Physical Damage Aura", "Elemental Resistance Aura", "Always Stun", "Bleed on Hit"] },
        { name: "Slitherspitter", cost: 31.2, location: "", auras: ["Extra Physical Damage Aura", "Poison on Hit", "Bleed on Hit"] },
        { name: "Crustic Crab", cost: 32.1, location: "Whakapanu", auras: ["Haste Aura", "Periodic Invulnerability Aura", "Extra Physical Damage Aura", "Energy Shield Aura", "Elemental Resistance Aura", "Temporal Bubble", "Hinder Aura", "Chill on Hit"] },
        { name: "Rasp Scavenger (rare)", cost: 32.7, location: "Khari Crossing", auras: ["Elemental Resistance Aura", "Extra Physical Damage Aura", "Energy Shield Aura", "Shock on all Damage"] },
        { name: "Bane Sapling", cost: 33.3, location: "Jungle Ruins", auras: ["Energy Shield Aura", "Elemental Resistance Aura", "Poison on Hit", "Hinder Aura"] }
    ].sort((a,b) => a.cost - b.cost);

    let state = JSON.parse(localStorage.getItem('auraState')) || { 
        r: 0, g: 0, seen: 0, totalS: 0, cycleS: 0, paused: false, log: "", ema: 0,
        targetBeast: null, trackedAuras: {}, collectedAuras: {},
        sessionCount: 1, timerName: "Beast_Farm", successHistory: []
    };
    if (!state.collectedAuras) { state.collectedAuras = {}; ALL_AURAS.forEach(a => { state.collectedAuras[a] = { count: 0, beasts: [] }; }); }
    if (!state.successHistory) state.successHistory = [];

    const $ = id => document.getElementById(id);
    const rCount = $('rCount'), gCount = $('gCount'), seenCount = $('seenCount');
    const totalTime = $('totalTime'), cycleTime = $('cycleTime'), progressFill = $('progress-fill');
    const logDiv = $('log'), pauseBtn = $('pauseBtn'), timerName = $('timerName');
    const sessionId = $('sessionId'), targetDisplay = $('targetDisplay'), targetCostDisplay = $('targetCostDisplay');
    const targetAuras = $('targetAuras'), beastList = $('beastList');
    const auraCollection = $('auraCollection'), collectionProgress = $('collectionProgress');
    const successList = $('successList'), successCount = $('successCount');

    function renderBeastList() {
        beastList.innerHTML = '';
        BEAST_DB.forEach(beast => {
            let group = document.createElement('div');
            group.className = 'beast-group';
            if (state.targetBeast && state.targetBeast.name === beast.name) group.classList.add('selected-beast');
            let header = document.createElement('div');
            header.className = 'beast-header';
            header.onclick = () => selectBeast(beast);
            header.innerHTML = `<span class="beast-name" title="${beast.name}">${beast.name}</span><span class="beast-cost">${beast.cost}%</span><span class="beast-location" title="${beast.location}">${beast.location}</span>`;
            group.appendChild(header);
            let auraDiv = document.createElement('div');
            auraDiv.className = 'aura-list';
            beast.auras.forEach(auraName => {
                let collected = state.collectedAuras[auraName]?.count > 0 || false;
                let item = document.createElement('span');
                item.className = 'aura-item' + (collected ? ' collected' : '');
                item.textContent = auraName.replace(" Aura", "").replace("Extra Physical Damage", "Phys").replace("Elemental Resistance", "Res").replace("Periodic Invulnerability", "Invuln");
                item.title = auraName;
                auraDiv.appendChild(item);
            });
            group.appendChild(auraDiv);
            beastList.appendChild(group);
        });
    }

    function selectBeast(beast) {
        state.targetBeast = { ...beast };
        if (!state.trackedAuras[beast.name]) {
            state.trackedAuras[beast.name] = {};
            beast.auras.forEach(a => { state.trackedAuras[beast.name][a] = false; });
        }
        timerName.value = beast.name;
        state.timerName = beast.name;
        updateTargetDisplay();
        renderBeastList();
        updateCollectionDisplay();
        saveData();
    }

    function toggleAura(beastName, auraName, checked) {
        if (!state.trackedAuras[beastName]) state.trackedAuras[beastName] = {};
        state.trackedAuras[beastName][auraName] = checked;
        saveData();
        if (state.targetBeast?.name === beastName) updateTargetDisplay();
        renderBeastList();
    }

    function clearTarget() {
        state.targetBeast = null;
        timerName.value = "Beast_Farm";
        state.timerName = "Beast_Farm";
        updateTargetDisplay();
        renderBeastList();
        saveData();
    }

    function updateTargetDisplay() {
        if (!state.targetBeast) {
            targetDisplay.innerText = 'None';
            targetCostDisplay.innerText = '-';
            targetAuras.innerHTML = '<span style="color:#666; font-size:0.8em;">Select a beast</span>';
            return;
        }
        targetDisplay.innerText = state.targetBeast.name;
        targetCostDisplay.innerText = state.targetBeast.cost + '%';
        let html = '';
        state.targetBeast.auras.forEach(auraName => {
            let checked = state.trackedAuras[state.targetBeast.name]?.[auraName] || false;
            let collected = state.collectedAuras[auraName]?.count > 0 || false;
            html += `<div style="display:flex;align-items:center;gap:4px;background:#1a1a1a;padding:2px 8px;border-radius:10px;border:1px solid ${checked ? '#4a8a4a' : '#2a2a2a'};">
                <input type="checkbox" ${checked ? 'checked' : ''} onchange="toggleAura('${state.targetBeast.name}', '${auraName}', this.checked)" style="width:13px;height:13px;cursor:pointer;">
                <span style="font-size:0.8em;${collected ? 'color:#8a8;' : ''}">${auraName.replace(" Aura", "").replace("Extra Physical Damage", "Phys").replace("Elemental Resistance", "Res").replace("Periodic Invulnerability", "Invuln")}${collected ? ' ✅' : ''}</span>
            </div>`;
        });
        targetAuras.innerHTML = html;
    }

    function updateCollectionDisplay() {
        let total = ALL_AURAS.length, collected = 0, html = '';
        ALL_AURAS.forEach(auraName => {
            let data = state.collectedAuras[auraName] || { count: 0, beasts: [] };
            if (data.count > 0) collected++;
            let isCollected = data.count > 0;
            let displayName = auraName.replace(" Aura", "").replace("Extra Physical Damage", "Phys").replace("Elemental Resistance", "Res").replace("Periodic Invulnerability", "Invuln");
            if (auraName === "Temporal Bubble") displayName = "TB";
            html += `<div class="aura-collection-item ${isCollected ? 'collected' : 'missing'}" title="${auraName}: ${data.beasts.join(', ') || 'none'}">
                <span>${displayName}</span>${isCollected ? `<span class="count">${data.count}</span>` : `<span class="missing-count">❌</span>`}
            </div>`;
        });
        auraCollection.innerHTML = html;
        collectionProgress.innerText = `${collected}/${total}`;
    }

    function updateSuccessHistory() {
        successCount.textContent = state.successHistory.length;
        if (state.successHistory.length === 0) {
            successList.innerHTML = '<div style="color:#666; font-size:0.8em; text-align:center; padding:6px;">No successes logged yet</div>';
            return;
        }
        let html = '';
        for (let i = state.successHistory.length - 1; i >= 0; i--) {
            const entry = state.successHistory[i];
            const auraStr = entry.auras.length > 0 ? entry.auras.map(a => 
                `<span class="s-aura">${a.replace(" Aura", "").replace("Extra Physical Damage", "Phys").replace("Elemental Resistance", "Res").replace("Periodic Invulnerability", "Invuln")}</span>`
            ).join(' ') : '<span class="s-aura" style="color:#666;">none</span>';
            html += `<div class="success-entry"><span class="s-beast">${entry.beast}</span>${auraStr}<span class="s-time">${entry.time || ''}</span></div>`;
        }
        successList.innerHTML = html;
    }

    function clearCheckboxes() {
        if (state.targetBeast) {
            let name = state.targetBeast.name;
            if (state.trackedAuras[name]) {
                Object.keys(state.trackedAuras[name]).forEach(key => { state.trackedAuras[name][key] = false; });
            }
            updateTargetDisplay();
            renderBeastList();
            saveData();
        }
    }

    function logSuccess() {
        if (state.paused) return;
        if (!state.targetBeast) { alert('Select a beast first!'); return; }
        state.g++;
        state.ema = (1 * 0.1) + (state.ema * 0.9);
        let timestamp = new Date().toLocaleTimeString();
        let beast = state.targetBeast;
        let tracked = state.trackedAuras[beast.name] || {};
        let activeAuras = beast.auras.filter(a => tracked[a]);
        activeAuras.forEach(auraName => {
            if (!state.collectedAuras[auraName]) state.collectedAuras[auraName] = { count: 0, beasts: [] };
            state.collectedAuras[auraName].count++;
            if (!state.collectedAuras[auraName].beasts.includes(beast.name)) {
                state.collectedAuras[auraName].beasts.push(beast.name);
            }
        });
        state.successHistory.push({ beast: beast.name, auras: activeAuras, time: timestamp });
        let auraStr = activeAuras.length > 0 ? activeAuras.join(', ') : 'none';
        state.log = `<div>${timestamp} ✅ Success | ${beast.name} (${beast.cost}%) | auras: ${auraStr} | cycle ${format(state.cycleS)}</div>` + state.log;
        state.cycleS = 0;
        clearCheckboxes();
        updateUI();
        renderBeastList();
        updateCollectionDisplay();
        updateSuccessHistory();
        saveData();
    }

    function logSeen() {
        if (state.paused) return;
        if (!state.targetBeast) { alert('Select a beast first!'); return; }
        state.seen = (state.seen || 0) + 1;
        let timestamp = new Date().toLocaleTimeString();
        let beast = state.targetBeast;
        let tracked = state.trackedAuras[beast.name] || {};
        let activeAuras = beast.auras.filter(a => tracked[a]);
        let auraStr = activeAuras.length > 0 ? activeAuras.join(', ') : 'none';
        state.log = `<div>${timestamp} 👀 Seen | ${beast.name} (${beast.cost}%) | auras: ${auraStr} | cycle ${format(state.cycleS)}</div>` + state.log;
        state.cycleS = 0;
        clearCheckboxes();
        updateUI();
        renderBeastList();
        saveData();
    }

    function add(isRed) {
        if (state.paused) return;
        state.r++;
        state.ema = (0 * 0.1) + (state.ema * 0.9);
        let timestamp = new Date().toLocaleTimeString();
        state.log = `<div>${timestamp} ❌ Fail | cycle ${format(state.cycleS)}</div>` + state.log;
        state.cycleS = 0;
        updateUI();
        saveData();
    }

    function clearHistory() {
        if (confirm('Clear all success history?')) {
            state.successHistory = [];
            updateSuccessHistory();
            saveData();
        }
    }

    function importCSV(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const content = e.target.result;
                const lines = content.split('\n').filter(line => line.trim());
                if (lines.length < 2) { alert('CSV file is empty or invalid'); return; }
                const headers = lines[0].split(',').map(h => h.trim());
                const timestampIdx = headers.indexOf('Timestamp');
                const resultIdx = headers.indexOf('Result');
                const beastIdx = headers.indexOf('Beast');
                const costIdx = headers.indexOf('BeastCost');
                const aurasIdx = headers.indexOf('Auras');
                
                let newCollected = {};
                ALL_AURAS.forEach(a => { newCollected[a] = { count: 0, beasts: [] }; });
                let newR = 0, newG = 0, newSeen = 0;
                let newHistory = [];
                let newLog = '';
                
                for (let i = 1; i < lines.length; i++) {
                    const cols = lines[i].split(',').map(c => c.trim());
                    if (cols.length < 6) continue;
                    const time = timestampIdx >= 0 ? cols[timestampIdx] || '' : cols[0] || '';
                    const result = resultIdx >= 0 ? cols[resultIdx] || '' : cols[1] || '';
                    const beastName = beastIdx >= 0 ? cols[beastIdx] || '' : cols[2] || '';
                    const cost = costIdx >= 0 ? cols[costIdx] || '' : cols[3] || '';
                    const auras = aurasIdx >= 0 ? cols[aurasIdx] || '' : cols[4] || '';
                    
                    if (result === 'Success') {
                        newG++;
                        const auraList = auras === 'none' ? [] : auras.split(', ').filter(a => a);
                        if (auraList.length > 0 || beastName) {
                            newHistory.push({ beast: beastName, auras: auraList, time: time });
                        }
                        auraList.forEach(aura => {
                            if (newCollected[aura]) {
                                newCollected[aura].count++;
                                if (!newCollected[aura].beasts.includes(beastName)) {
                                    newCollected[aura].beasts.push(beastName);
                                }
                            }
                        });
                    } else if (result === 'Fail') {
                        newR++;
                    } else if (result === 'Seen') {
                        newSeen++;
                    }
                }
                state.r = newR; state.g = newG; state.seen = newSeen;
                state.collectedAuras = newCollected;
                state.successHistory = newHistory;
                updateUI();
                renderBeastList();
                updateCollectionDisplay();
                updateSuccessHistory();
                saveData();
                alert(`CSV imported: ${newG} successes, ${newR} fails, ${newSeen} seen, ${newHistory.length} history entries`);
            } catch(err) {
                alert('Error importing CSV: ' + err.message);
            }
        };
        reader.readAsText(file);
        event.target.value = '';
    }

    function format(s) {
        let h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
        return [h,m,sec].map(v => v.toString().padStart(2,'0')).join(':');
    }

    function updateUI() {
        let total = state.r + state.g;
        rCount.innerText = state.r;
        gCount.innerText = state.g;
        seenCount.innerText = state.seen || 0;
        let rate = total ? (state.g/total*100) : 0;
        document.getElementById('pct').innerText = rate.toFixed(1) + "%";
        totalTime.innerText = format(state.totalS);
        cycleTime.innerText = format(state.cycleS);
        progressFill.style.width = (total % 100) + "%";
        logDiv.innerHTML = "<strong>Log:</strong>" + state.log;
        sessionId.innerText = `⚡ #${String(state.sessionCount || 1).padStart(3,'0')}`;
        timerName.value = state.timerName || "Beast_Farm";
        updateCollectionDisplay();
        updateSuccessHistory();
        saveData();
    }

    setInterval(() => {
        if (!state.paused) { state.totalS++; state.cycleS++; updateUI(); }
    }, 1000);

    function togglePause() { 
        state.paused = !state.paused; 
        pauseBtn.innerText = state.paused ? "▶️" : "⏸️"; 
        saveData();
    }

    function saveData() {
        state.timerName = timerName.value;
        localStorage.setItem('auraState', JSON.stringify(state));
    }

    function resetStats() { 
        if(confirm("Clear all data?")) { 
            state = { 
                r: 0, g: 0, seen: 0, totalS: 0, cycleS: 0, paused: false, log: "", ema: 0,
                targetBeast: null, trackedAuras: {}, collectedAuras: {},
                sessionCount: 1, timerName: "Beast_Farm", successHistory: []
            };
            ALL_AURAS.forEach(a => { state.collectedAuras[a] = { count: 0, beasts: [] }; });
            localStorage.removeItem('auraState');
            timerName.value = "Beast_Farm";
            renderBeastList();
            updateTargetDisplay();
            updateUI();
            updateSuccessHistory();
            saveData();
        } 
    }

    function exportCSV() {
        let lines = ["Timestamp,Result,Beast,BeastCost,Auras,CycleTime"];
        let logEntries = state.log.split('</div>').filter(s => s.trim());
        for (let entry of logEntries) {
            let clean = entry.replace(/<[^>]*>/g, '').trim();
            if (!clean) continue;
            let parts = clean.split('|').map(s => s.trim());
            if (parts.length >= 4) {
                let timePart = parts[0].split(' ')[0] || '';
                let result = parts[0].includes('Fail') ? 'Fail' : parts[0].includes('Seen') ? 'Seen' : 'Success';
                let beastPart = parts[1] || '';
                let beastName = beastPart.split('(')[0].trim() || '';
                let cost = beastPart.match(/\((\d+\.?\d*)%\)/)?.[1] || '';
                let auras = parts[2].replace('auras:', '').trim() || '';
                let cycle = parts[3].replace('cycle', '').trim() || '';
                lines.push(`${timePart},${result},${beastName},${cost},${auras},${cycle}`);
            } else {
                lines.push(`${clean},,,,`);
            }
        }
        let blob = new Blob([lines.join('\n')], {type: 'text/csv'});
        let a = document.createElement('a'); 
        a.href = URL.createObjectURL(blob); 
        a.download = (timerName.value || 'beast_tracker') + ".csv"; 
        a.click();
    }

    document.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'INPUT') return;
        if(e.key.toLowerCase() === 'r') add(true);
        if(e.key.toLowerCase() === 'g') logSuccess();
        if(e.key.toLowerCase() === 's') logSeen();
        if(e.key === ' ') { e.preventDefault(); togglePause(); }
    });
    timerName.addEventListener('change', saveData);

    if (state.timerName) timerName.value = state.timerName;
    renderBeastList();
    updateTargetDisplay();
    updateUI();
</script>
</body>
</html>
